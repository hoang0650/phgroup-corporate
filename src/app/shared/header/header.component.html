<header class="header" role="banner">
  <div class="container">
    <div class="header-content">
      <a routerLink="/" class="logo" (click)="closeMenu()" title="PHGroup - Trang chủ">
        <span class="logo-icon" aria-hidden="true"><i class="fas fa-code"></i></span>
        <span class="logo-text">PHGroup</span>
      </a>

      <nav class="nav" [class.nav-active]="isMenuOpen" role="navigation" aria-label="Main navigation">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="closeMenu()">Trang Chủ</a>
        <a routerLink="/about" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Về Chúng Tôi</a>
        <a routerLink="/news" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Tin Tức</a>
      </nav>

      <button class="menu-toggle" (click)="toggleMenu()" [class.menu-active]="isMenuOpen" aria-label="Toggle menu" aria-expanded="isMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
